# Minimal Development Pre-commit Configuration
# Enterprise features commented out - uncomment as needed

repos:
  # Essential code formatting
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.13

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ['--profile', 'black']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff
        args: [--fix]

  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  # Essential security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: '1.8.6'
    hooks:
      - id: bandit
        args: ['-c', 'bandit.yaml', '--skip', 'B101'] # Skip assert_used in dev
        files: ^orchestra/.*\.py$

  # Static typing
  - repo: local
    hooks:
      - id: mypy-quick
        name: MyPy (changed files)
        entry: poetry run mypy
        language: system
        pass_filenames: true
        files: ^orchestra/.*\.py$

      - id: mypy-full
        name: MyPy (full project)
        entry: poetry run mypy orchestra/
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # Code coverage gate (progressive: 70% → 80% → 90%)
  - repo: local
    hooks:
      - id: coverage-check
        name: Coverage check (minimum 90%)
        entry: poetry run pytest --cov=orchestra --cov-fail-under=90 --cov-report=term-missing
        language: system
        pass_filenames: false
        files: ^(orchestra/.*\.py|tests/.*\.py)$
