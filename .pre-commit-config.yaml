# Minimal Development Pre-commit Configuration
# Enterprise features commented out - uncomment as needed

repos:
  # Essential code formatting
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.13

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff
        args: [--fix]

  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  # Essential security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: '1.8.6'
    hooks:
      - id: bandit
        args: ['-c', 'bandit.yaml', '--skip', 'B101'] # Skip assert_used in dev
        files: ^src/.*\.py$

  # Code coverage gate (progressive: 55% → 60% → 80%)
  - repo: local
    hooks:
      - id: coverage-check
        name: Coverage check (minimum 70%)
        entry: poetry run pytest --cov=src --cov-fail-under=70 --cov-report=term-missing
        language: system
        pass_filenames: false
        files: ^(src/.*\.py|tests/.*\.py)$
