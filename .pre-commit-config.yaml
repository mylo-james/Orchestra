# Orchestra AI Agent System - Pre-commit Configuration
# Professional-grade hooks with AI-specific guardrails

repos:
  # ============================================================================
  # BASIC CODE QUALITY
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: 🧹 Remove trailing whitespace
      - id: end-of-file-fixer
        name: 📄 Fix end of files
      - id: check-yaml
        name: 📋 Check YAML syntax
      - id: check-json
        name: 🔍 Check JSON syntax
      - id: check-toml
        name: ⚙️ Check TOML syntax
      - id: check-merge-conflict
        name: 🔀 Check for merge conflicts
      - id: check-added-large-files
        name: 📦 Check for large files
        args: ['--maxkb=1000']
      - id: check-case-conflict
        name: 📁 Check for case conflicts
      - id: mixed-line-ending
        name: 📝 Check line endings

  # ============================================================================
  # PYTHON CODE QUALITY & SECURITY
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: 🎨 Format Python code (Black)
        language_version: python3.12

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: 📋 Sort Python imports (isort)
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: 🔍 Lint Python code (flake8)
        additional_dependencies:
          - flake8-docstrings
          - flake8-type-checking
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-simplify
        args:
          - --max-line-length=88
          - --extend-ignore=E203,W503,E501
          - --max-complexity=10

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: 📊 Type checking (mypy)
        additional_dependencies:
          - types-requests
          - types-PyYAML
          - pydantic
        args:
          - --strict
          - --ignore-missing-imports

  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: 🔒 Security scan (Bandit)
        args: ['-r', 'src/', '-f', 'screen']
        exclude: tests/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: 🕵️ Detect secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/gitguardian/ggshield
    rev: v1.25.0
    hooks:
      - id: ggshield
        name: 🛡️ GitGuardian secret scan
        language: python
        stages: [commit]

  # ============================================================================
  # AI-SPECIFIC SECURITY CHECKS
  # ============================================================================
  - repo: local
    hooks:
      - id: ai-prompt-injection-check
        name: 🤖 AI Prompt Injection Check
        entry: python scripts/pre_commit_hooks/check_prompt_injection.py
        language: python
        files: \.(py|md|txt|json)$
        additional_dependencies:
          - pydantic
          - re

      - id: ai-code-generation-security
        name: 🔍 AI Code Generation Security
        entry: python scripts/pre_commit_hooks/check_ai_code_security.py
        language: python
        files: \.py$
        additional_dependencies:
          - ast
          - bandit

      - id: agent-tool-validation
        name: 🛠️ Agent Tool Validation
        entry: python scripts/pre_commit_hooks/validate_agent_tools.py
        language: python
        files: ^src/agents/.*\.py$
        additional_dependencies:
          - pydantic
          - typing

  # ============================================================================
  # TESTING REQUIREMENTS
  # ============================================================================
  - repo: local
    hooks:
      - id: test-coverage-check
        name: 📊 Test Coverage Check
        entry: python scripts/pre_commit_hooks/check_test_coverage.py
        language: python
        files: ^src/.*\.py$
        pass_filenames: false
        additional_dependencies:
          - coverage
          - pytest-cov

      - id: test-existence-check
        name: 🧪 Test Existence Check
        entry: python scripts/pre_commit_hooks/check_test_exists.py
        language: python
        files: ^src/.*\.py$
        additional_dependencies:
          - pathlib

  # ============================================================================
  # DOCUMENTATION & STANDARDS
  # ============================================================================
  - repo: local
    hooks:
      - id: docstring-check
        name: 📚 Docstring Check
        entry: python scripts/pre_commit_hooks/check_docstrings.py
        language: python
        files: ^src/.*\.py$
        additional_dependencies:
          - ast

      - id: naming-convention-check
        name: 📝 Naming Convention Check
        entry: python scripts/pre_commit_hooks/check_naming_conventions.py
        language: python
        files: ^src/.*\.py$
        additional_dependencies:
          - ast
          - re

  # ============================================================================
  # FRONTEND QUALITY (if applicable)
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: 🔍 ESLint (TypeScript)
        files: \.(ts|tsx|js|jsx)$
        additional_dependencies:
          - '@typescript-eslint/eslint-plugin'
          - '@typescript-eslint/parser'
          - 'eslint-config-next'

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: 🎨 Format frontend code (Prettier)
        files: \.(ts|tsx|js|jsx|json|css|md)$

  # ============================================================================
  # FINAL VALIDATION
  # ============================================================================
  - repo: local
    hooks:
      - id: final-security-check
        name: 🛡️ Final Security Validation
        entry: python scripts/pre_commit_hooks/final_security_check.py
        language: python
        pass_filenames: false
        stages: [pre-push]
        additional_dependencies:
          - requests
          - pydantic

# ============================================================================
# CONFIGURATION
# ============================================================================
default_language_version:
  python: python3.12
  node: "20"

default_stages: [commit]

# Fail fast - stop on first failure
fail_fast: true

# Minimum pre-commit version
minimum_pre_commit_version: "3.0.0"