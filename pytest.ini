[pytest]
# Improve async test handling
asyncio_mode = auto

# Suppress noise but keep errors visible
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:rich.*
    ignore::UserWarning:.*ipywidgets.*
    ignore::RuntimeWarning:.*coroutine.*was never awaited
    ignore::RuntimeWarning:.*test_coro.*was never awaited
    ignore:.*coroutine.*was never awaited:RuntimeWarning
    ignore::UserWarning:structlog.*

# Resource optimization
log_level = ERROR
log_cli = false

# Execution control - show errors but clean output
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --maxfail=10

# Mark slow tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    security: marks tests as security tests
    hanging_risk: marks tests that might hang or take long time
