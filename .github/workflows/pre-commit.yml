name: Pre-commit Hooks

on:
  pull_request:
    branches: [main, develop]

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: "1.7.1"
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-precommit-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    - name: Install project
      run: poetry install --no-interaction

    - name: Run pre-commit
      run: |
        poetry run pre-commit run --all-files --show-diff-on-failure || true
        
    - name: Check for changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "Pre-commit hooks made changes:"
          git diff
          echo "::warning::Pre-commit hooks auto-fixed code formatting issues"
          exit 1
        else
          echo "No changes needed - code is already properly formatted"
        fi