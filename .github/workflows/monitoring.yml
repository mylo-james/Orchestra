name: 📊 CI/CD Monitoring & Health Checks

on:
  schedule:
    # Run health checks every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["🚀 CI/CD Pipeline - Orchestra AI Agent System"]
    types: [completed]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================================
  # Pipeline Health Monitoring
  # ============================================================================
  pipeline-health:
    name: 🏥 Pipeline Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📊 Analyze recent pipeline runs
        uses: actions/github-script@v7
        with:
          script: |
            // Get recent workflow runs
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              per_page: 20
            });
            
            // Calculate success rate
            const totalRuns = runs.workflow_runs.length;
            const successfulRuns = runs.workflow_runs.filter(run => run.conclusion === 'success').length;
            const failedRuns = runs.workflow_runs.filter(run => run.conclusion === 'failure').length;
            const successRate = totalRuns > 0 ? (successfulRuns / totalRuns) * 100 : 100;
            
            console.log(`📊 Pipeline Health Metrics:`);
            console.log(`  Total runs (last 20): ${totalRuns}`);
            console.log(`  Successful: ${successfulRuns}`);
            console.log(`  Failed: ${failedRuns}`);
            console.log(`  Success rate: ${successRate.toFixed(1)}%`);
            
            // Alert if success rate is too low
            if (successRate < 80) {
              console.log(`🚨 ALERT: Pipeline success rate is below 80%!`);
              core.setFailed(`Pipeline health check failed: ${successRate.toFixed(1)}% success rate`);
            } else {
              console.log(`✅ Pipeline health is good`);
            }
            
            // Set outputs for notifications
            core.setOutput('success_rate', successRate.toFixed(1));
            core.setOutput('total_runs', totalRuns);
            core.setOutput('failed_runs', failedRuns);

  # ============================================================================
  # Security Monitoring
  # ============================================================================
  security-monitoring:
    name: 🛡️ Security Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        
      - name: 🔧 Install security tools
        run: |
          poetry install --with security
          
      - name: 🔍 Check for new vulnerabilities
        run: |
          echo "🔍 Scanning for new security vulnerabilities..."
          
          # Run safety check
          poetry run safety check --json --output current-vulns.json || true
          
          # Compare with baseline if it exists
          if [ -f "security-baseline.json" ]; then
            echo "📊 Comparing with security baseline..."
            # Add comparison logic here
          else
            echo "📋 Creating new security baseline..."
            cp current-vulns.json security-baseline.json
          fi
          
      - name: 🕵️ Monitor for secrets
        run: |
          echo "🕵️ Monitoring for accidentally committed secrets..."
          poetry run detect-secrets scan --all-files --baseline .secrets.baseline
          
      - name: 📊 Generate security metrics
        run: |
          echo "📊 Generating security metrics..."
          
          # Count security issues by type
          if [ -f "current-vulns.json" ]; then
            vuln_count=$(jq length current-vulns.json 2>/dev/null || echo "0")
            echo "vulnerability_count=$vuln_count" >> $GITHUB_ENV
          fi
          
          # Check Bandit results
          poetry run bandit -r src/ -f json -o current-bandit.json || true
          if [ -f "current-bandit.json" ]; then
            bandit_issues=$(jq '.results | length' current-bandit.json 2>/dev/null || echo "0")
            echo "bandit_issues=$bandit_issues" >> $GITHUB_ENV
          fi
          
      - name: 📋 Upload security monitoring results
        uses: actions/upload-artifact@v3
        with:
          name: security-monitoring-${{ github.run_number }}
          path: |
            current-vulns.json
            current-bandit.json

  # ============================================================================
  # Test Coverage Monitoring
  # ============================================================================
  coverage-monitoring:
    name: 📊 Coverage Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        
      - name: 🔧 Install dependencies
        run: |
          poetry install --with test
          
      - name: 📊 Generate coverage report
        run: |
          echo "📊 Generating test coverage report..."
          poetry run pytest tests/unit/ --cov=src --cov-report=json --cov-report=term -q
          
      - name: 📈 Analyze coverage trends
        run: |
          echo "📈 Analyzing coverage trends..."
          
          if [ -f "coverage.json" ]; then
            total_coverage=$(jq '.totals.percent_covered' coverage.json)
            echo "total_coverage=$total_coverage" >> $GITHUB_ENV
            
            # Check coverage by module
            echo "📊 Coverage by module:"
            jq -r '.files | to_entries[] | "\(.key): \(.value.summary.percent_covered)%"' coverage.json | head -10
          fi
          
      - name: 📋 Upload coverage monitoring
        uses: actions/upload-artifact@v3
        with:
          name: coverage-monitoring-${{ github.run_number }}
          path: |
            coverage.json
            htmlcov/

  # ============================================================================
  # Dependency Monitoring
  # ============================================================================
  dependency-monitoring:
    name: 📦 Dependency Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        
      - name: 📊 Analyze dependency health
        run: |
          echo "📊 Analyzing dependency health..."
          
          # Check for outdated packages
          poetry show --outdated > outdated-deps.txt || true
          
          # Count outdated dependencies
          outdated_count=$(wc -l < outdated-deps.txt || echo "0")
          echo "outdated_dependencies=$outdated_count" >> $GITHUB_ENV
          
          if [ "$outdated_count" -gt 0 ]; then
            echo "📦 Found $outdated_count outdated dependencies:"
            cat outdated-deps.txt
          else
            echo "✅ All dependencies are up to date"
          fi
          
      - name: 🔍 Check dependency tree
        run: |
          echo "🔍 Analyzing dependency tree..."
          poetry show --tree > dependency-tree.txt
          
      - name: 📋 Upload dependency monitoring
        uses: actions/upload-artifact@v3
        with:
          name: dependency-monitoring-${{ github.run_number }}
          path: |
            outdated-deps.txt
            dependency-tree.txt

  # ============================================================================
  # Performance Monitoring
  # ============================================================================
  performance-monitoring:
    name: ⚡ Performance Monitoring
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'schedule'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        
      - name: 🔧 Install dependencies
        run: |
          poetry install --with test
          
      - name: ⚡ Run performance benchmarks
        run: |
          echo "⚡ Running performance benchmarks..."
          
          # Run performance tests if they exist
          if [ -d "tests/performance" ]; then
            poetry run pytest tests/performance/ --benchmark-json=benchmark-results.json -q
          else
            echo "📊 No performance tests found - creating placeholder metrics"
            echo '{"benchmarks": []}' > benchmark-results.json
          fi
          
      - name: 📊 Analyze performance trends
        run: |
          echo "📊 Analyzing performance trends..."
          
          if [ -f "benchmark-results.json" ]; then
            benchmark_count=$(jq '.benchmarks | length' benchmark-results.json)
            echo "benchmark_count=$benchmark_count" >> $GITHUB_ENV
            
            if [ "$benchmark_count" -gt 0 ]; then
              echo "⚡ Performance benchmark summary:"
              jq -r '.benchmarks[] | "\(.name): \(.stats.mean)s (mean)"' benchmark-results.json
            fi
          fi
          
      - name: 📋 Upload performance monitoring
        uses: actions/upload-artifact@v3
        with:
          name: performance-monitoring-${{ github.run_number }}
          path: benchmark-results.json

  # ============================================================================
  # Monitoring Summary & Alerts
  # ============================================================================
  monitoring-summary:
    name: 📈 Monitoring Summary
    runs-on: ubuntu-latest
    needs: [pipeline-health, security-monitoring, coverage-monitoring, dependency-monitoring]
    if: always()
    
    steps:
      - name: 📊 Generate monitoring report
        run: |
          echo "📊 ORCHESTRA AI MONITORING REPORT"
          echo "================================="
          echo "Generated: $(date)"
          echo ""
          
          echo "🏥 Pipeline Health: ${{ needs.pipeline-health.result }}"
          echo "🛡️ Security Monitoring: ${{ needs.security-monitoring.result }}"
          echo "📊 Coverage Monitoring: ${{ needs.coverage-monitoring.result }}"
          echo "📦 Dependency Monitoring: ${{ needs.dependency-monitoring.result }}"
          echo ""
          
          # Check for any failures
          failed_jobs=""
          if [ "${{ needs.pipeline-health.result }}" = "failure" ]; then
            failed_jobs="$failed_jobs pipeline-health"
          fi
          if [ "${{ needs.security-monitoring.result }}" = "failure" ]; then
            failed_jobs="$failed_jobs security-monitoring"
          fi
          if [ "${{ needs.coverage-monitoring.result }}" = "failure" ]; then
            failed_jobs="$failed_jobs coverage-monitoring"
          fi
          if [ "${{ needs.dependency-monitoring.result }}" = "failure" ]; then
            failed_jobs="$failed_jobs dependency-monitoring"
          fi
          
          if [ -n "$failed_jobs" ]; then
            echo "🚨 ALERT: Failed monitoring jobs: $failed_jobs"
            echo "failed_jobs=$failed_jobs" >> $GITHUB_ENV
          else
            echo "✅ All monitoring checks passed"
          fi
          
      - name: 🚨 Send alerts for failures
        if: env.failed_jobs != ''
        run: |
          echo "🚨 MONITORING ALERT!"
          echo "Failed jobs: ${{ env.failed_jobs }}"
          echo "Please investigate monitoring failures immediately."
          
          # In a real environment, you would send notifications here
          # Examples: Slack webhook, email, PagerDuty, etc.

  # ============================================================================
  # Cleanup Old Monitoring Data
  # ============================================================================
  cleanup-monitoring:
    name: 🧹 Cleanup Monitoring Data
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: 🧹 Clean up old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            // Clean up monitoring artifacts older than 30 days
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            let deletedCount = 0;
            for (const artifact of artifacts.artifacts) {
              const createdAt = new Date(artifact.created_at);
              
              // Delete old monitoring artifacts
              if (createdAt < thirtyDaysAgo && 
                  (artifact.name.includes('monitoring') || 
                   artifact.name.includes('security-scan') ||
                   artifact.name.includes('coverage'))) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id
                  });
                  deletedCount++;
                } catch (error) {
                  console.log(`Failed to delete artifact ${artifact.name}: ${error.message}`);
                }
              }
            }
            
            console.log(`🧹 Cleaned up ${deletedCount} old monitoring artifacts`);
            
      - name: 📊 Repository metrics
        run: |
          echo "📊 Repository Health Metrics:"
          echo "  Repository size: $(du -sh . | cut -f1)"
          echo "  Total files: $(find . -type f | wc -l)"
          echo "  Python files: $(find . -name "*.py" | wc -l)"
          echo "  Test files: $(find tests/ -name "*.py" 2>/dev/null | wc -l || echo "0")"