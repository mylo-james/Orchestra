name: Orchestra Laptop-Optimized CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.8.3'

jobs:
  # Core Quality Pipeline - Fast & Essential
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction

      - name: 🎨 Code Quality - Format & Lint (BLOCKING)
        run: |
          echo "🎨 Checking code formatting..."
          poetry run black --check src/ tests/
          poetry run isort --check-only src/ tests/
          echo "🔍 Running linting checks..."
          poetry run ruff check src/ tests/

      - name: 🔒 Security Scan (BLOCKING)
        run: |
          echo "🔍 Running security scans..."
          poetry run bandit -r src/ -c bandit.yaml
          poetry run pip-audit

      - name: 🧪 Tests + Coverage Gate (BLOCKING)
        run: |
          echo "🧪 Running tests with HARD 70% coverage gate..."
          poetry run pytest tests/ \
            --cov=src \
            --cov-fail-under=70 \
            --cov-report=term-missing \
            --cov-report=html \
            -v

          echo "🎯 Validating coverage meets 70% minimum..."
          COVERAGE=$(poetry run coverage report --precision=2 | grep TOTAL | awk '{print $4}' | sed 's/%//')
          echo "✅ Coverage: ${COVERAGE}% (required: ≥70%)"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ COVERAGE GATE FAILED: ${COVERAGE}% < 70%"
            exit 1
          fi

      - name: 🐳 Docker Build Test (Local Only)
        run: |
          echo "🐳 Testing Docker build for laptop deployment..."
          docker build -t orchestra:ci-test .
          docker run --rm orchestra:ci-test python -c "import src; print('✅ Docker build works!')"
          echo "✅ Docker image builds successfully for laptop deployment"
