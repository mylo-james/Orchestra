name: Orchestra Simple CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.8.3'

jobs:
  # Test Suite - The Most Important Thing
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: test_orchestra
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install project
        run: poetry install --no-interaction

      - name: Set up test environment
        run: |
          # Create .env file for testing
          cat > .env << EOF
          ENVIRONMENT=test
          DEBUG=true
          OPENAI_API_KEY=sk-test-key-for-ci-testing-only
          PINECONE_API_KEY=test-pinecone-key
          PINECONE_ENVIRONMENT=test-environment
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          POSTGRES_DB=test_orchestra
          POSTGRES_USER=test_user
          POSTGRES_PASSWORD=test_password
          EOF

      - name: Run all tests
        run: |
          poetry run pytest tests/ \
            --cov=src \
            --cov-fail-under=70 \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junit-xml=junit.xml \
            -v 2>/dev/null

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            junit.xml
            htmlcov/
            coverage.xml

  # CRITICAL SECURITY & QUALITY GATES (BLOCKING)
  security-and-quality:
    name: Security & Quality Gates
    runs-on: ubuntu-latest
    needs: test # Only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: 🔒 Security Scan - Bandit (BLOCKING)
        run: |
          echo "🔍 Running Bandit security scan..."
          poetry run bandit -r src/ -c bandit.yaml -f json -o bandit-report.json
          poetry run bandit -r src/ -c bandit.yaml
        # NO continue-on-error - this MUST block deployment if security issues found!

      - name: 🛡️ Dependency Security - pip-audit (BLOCKING)
        run: |
          echo "🔍 Checking dependencies for vulnerabilities..."
          poetry run pip-audit

      - name: 📝 Code Quality - Format Check (BLOCKING)
        run: |
          echo "🎨 Checking code formatting..."
          poetry run black --check src/ tests/
          poetry run isort --check-only src/ tests/
        # NO continue-on-error - enforce consistent formatting

      - name: 🔍 Code Quality - Linting (BLOCKING)
        run: |
          echo "🔍 Running linting checks..."
          poetry run ruff check src/ tests/
        # NO continue-on-error - enforce code quality standards

      - name: 📊 Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # Docker Build & Security (Essential)
  docker:
    name: Docker Build & Security
    runs-on: ubuntu-latest
    needs: [test, security-and-quality] # Must pass security gates first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: orchestra:test
          load: true # Make image available to local Docker daemon
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🐳 Container Security Scan - Trivy (BLOCKING)
        run: |
          echo "🔍 Scanning Docker image for application vulnerabilities..."
          docker images | grep orchestra  # Show our built image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image --exit-code 1 --severity HIGH,CRITICAL \
            --scanners vuln --ignore-unfixed orchestra:test
        # NO continue-on-error - this MUST block if HIGH/CRITICAL vulnerabilities found!

      - name: Test Docker image
        run: |
          docker run --rm orchestra:test python -c "import src; print('✅ Orchestra Docker image works!')"
