name: 🚀 CI/CD Pipeline - Orchestra AI Agent System

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  POETRY_VERSION: "1.7.1"

jobs:
  # ============================================================================
  # STAGE 1: Code Quality & Security Checks
  # ============================================================================
  code-quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
          
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
          
      - name: 📚 Cache dependencies
        uses: actions/cache@v3
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}
          
      - name: 🔧 Install dependencies
        run: |
          poetry install --with dev,test,security
          
      - name: 🎨 Code formatting check (Black)
        run: |
          poetry run black --check --diff .
          
      - name: 📋 Import sorting check (isort)
        run: |
          poetry run isort --check-only --diff .
          
      - name: 🔍 Linting (flake8)
        run: |
          poetry run flake8 src/ tests/
          
      - name: 🔒 Security scan (Bandit)
        run: |
          poetry run bandit -r src/ -f json -o bandit-report.json
          poetry run bandit -r src/ -f txt
          
      - name: 📊 Type checking (mypy)
        run: |
          poetry run mypy src/
          
      - name: 🛡️ Dependency security check
        run: |
          poetry run safety check --json --output safety-report.json
          poetry run safety check
          
      - name: 📋 Upload security reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            
  # ============================================================================
  # STAGE 2: Frontend Quality Checks
  # ============================================================================
  frontend-quality:
    name: 🎨 Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, '[frontend]')
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📚 Install dependencies
        run: npm ci
        
      - name: 🔍 ESLint check
        run: npm run lint
        
      - name: 🎨 Prettier check
        run: npm run format:check
        
      - name: 📊 TypeScript check
        run: npm run type-check

  # ============================================================================
  # STAGE 3: Unit Tests
  # ============================================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [code-quality]
    
    strategy:
      matrix:
        python-version: ["3.12"]
        
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
          
      - name: 📚 Cache dependencies
        uses: actions/cache@v3
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
          
      - name: 🔧 Install dependencies
        run: |
          poetry install --with dev,test
          
      - name: 🧪 Run unit tests with coverage
        run: |
          poetry run pytest tests/unit/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --cov-fail-under=90 \
            --junitxml=pytest-report.xml \
            -v
            
      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          
      - name: 📋 Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: pytest-results
          path: |
            pytest-report.xml
            htmlcov/

  # ============================================================================
  # STAGE 4: Integration Tests
  # ============================================================================
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orchestra_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
          
      - name: 🔧 Install dependencies
        run: |
          poetry install --with dev,test
          
      - name: 🏗️ Start Temporal test server
        run: |
          poetry run temporal server start-dev --headless &
          sleep 10  # Wait for Temporal to start
          
      - name: 🧪 Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orchestra_test
          TEMPORAL_HOST: localhost:7233
          PINECONE_API_KEY: ${{ secrets.PINECONE_TEST_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_TEST_API_KEY }}
        run: |
          poetry run pytest tests/integration/ \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=80 \
            --junitxml=integration-report.xml \
            -v
            
      - name: 📋 Upload integration test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-results
          path: integration-report.xml

  # ============================================================================
  # STAGE 5: AI-Specific Security Tests
  # ============================================================================
  ai-security-tests:
    name: 🤖 AI Security Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [code-quality]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          
      - name: 🔧 Install dependencies
        run: |
          poetry install --with dev,test,security
          
      - name: 🛡️ AI Safety Tests
        run: |
          poetry run pytest tests/security/ \
            --junitxml=ai-security-report.xml \
            -v
            
      - name: 🔍 Prompt Injection Tests
        run: |
          poetry run python scripts/security_check.py --test-prompt-injection
          
      - name: 🔒 Code Generation Security Scan
        run: |
          poetry run python scripts/security_check.py --test-code-generation
          
      - name: 📋 Upload AI security results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ai-security-results
          path: ai-security-report.xml

  # ============================================================================
  # STAGE 6: End-to-End Tests
  # ============================================================================
  e2e-tests:
    name: 🎭 End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [integration-tests]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 🔧 Install all dependencies
        run: |
          pip install poetry
          poetry install --with dev,test
          npm ci
          
      - name: 🏗️ Build frontend
        run: npm run build
        
      - name: 🎭 Install Playwright
        run: npx playwright install --with-deps
        
      - name: 🧪 Run E2E tests
        env:
          GITHUB_TEST_TOKEN: ${{ secrets.GITHUB_TEST_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_TEST_API_KEY }}
        run: |
          poetry run pytest tests/e2e/ \
            --junitxml=e2e-report.xml \
            -v
            
      - name: 📋 Upload E2E results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-results
          path: |
            e2e-report.xml
            test-results/

  # ============================================================================
  # STAGE 7: Build & Package
  # ============================================================================
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-tests, ai-security-tests]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          
      - name: 🔧 Install dependencies
        run: |
          poetry install --only main
          
      - name: 🏗️ Build package
        run: |
          poetry build
          
      - name: 📋 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: python-package
          path: dist/

  # ============================================================================
  # STAGE 8: Security Scanning (Advanced)
  # ============================================================================
  security-scan:
    name: 🛡️ Advanced Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 🔍 Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: python
          queries: security-and-quality
          
      - name: 🏗️ Autobuild
        uses: github/codeql-action/autobuild@v2
        
      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        
      - name: 🔒 Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python
            p/owasp-top-ten
            
      - name: 🛡️ SAST Scan with Snyk
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          
      - name: 🔍 Container Security Scan
        if: github.event_name == 'pull_request'
        run: |
          docker build -t orchestra-ai:${{ github.sha }} .
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd):/workspace \
            aquasec/trivy image orchestra-ai:${{ github.sha }}

  # ============================================================================
  # STAGE 9: Performance & Load Tests
  # ============================================================================
  performance-tests:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [integration-tests]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          
      - name: 🔧 Install dependencies
        run: |
          poetry install --with dev,test
          
      - name: ⚡ Run performance tests
        run: |
          poetry run pytest tests/performance/ \
            --benchmark-only \
            --benchmark-json=benchmark-report.json \
            -v
            
      - name: 📊 Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: benchmark-report.json

  # ============================================================================
  # STAGE 10: Deployment (Staging)
  # ============================================================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [e2e-tests, security-scan, performance-tests]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🏗️ Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: python-package
          path: dist/
          
      - name: 🚀 Deploy to staging
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "🚀 Deploying to staging environment..."
          # Add actual deployment commands here
          
      - name: 🔍 Staging health check
        run: |
          echo "🔍 Running staging health checks..."
          # Add health check commands here

  # ============================================================================
  # STAGE 11: Deployment (Production)
  # ============================================================================
  deploy-production:
    name: 🌟 Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🏗️ Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: python-package
          path: dist/
          
      - name: 🌟 Deploy to production
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "🌟 Deploying to production environment..."
          # Add actual deployment commands here
          
      - name: 🔍 Production health check
        run: |
          echo "🔍 Running production health checks..."
          # Add health check commands here
          
      - name: 📊 Performance monitoring
        run: |
          echo "📊 Setting up production monitoring..."
          # Add monitoring setup here

  # ============================================================================
  # STAGE 12: Notification & Cleanup
  # ============================================================================
  notify-success:
    name: ✅ Success Notification
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: success()
    
    steps:
      - name: ✅ Notify success
        run: |
          echo "🎉 Pipeline completed successfully!"
          echo "✅ All quality gates passed"
          echo "🚀 Deployment successful"
          
  notify-failure:
    name: ❌ Failure Notification
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests, ai-security-tests, security-scan]
    if: failure()
    
    steps:
      - name: ❌ Notify failure
        run: |
          echo "❌ Pipeline failed!"
          echo "🔍 Check the failed jobs for details"
          echo "🛠️ Fix issues before merging"