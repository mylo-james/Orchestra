name: 📦 Automated Dependency Updates

on:
  schedule:
    # Run dependency updates every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of update to perform'
        required: true
        default: 'minor'
        type: choice
        options:
          - 'patch'
          - 'minor'
          - 'major'
          - 'security-only'

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================================
  # Security Updates (Auto-merge eligible)
  # ============================================================================
  security-updates:
    name: 🔒 Security Updates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.7.1"
          
      - name: 🔍 Check for security updates
        run: |
          echo "🔍 Checking for security vulnerabilities..."
          
          # Run safety check to identify vulnerable packages
          poetry run safety check --json --output current-vulns.json || true
          
          if [ -f "current-vulns.json" ] && [ -s "current-vulns.json" ]; then
            vuln_count=$(jq length current-vulns.json)
            echo "🚨 Found $vuln_count vulnerable dependencies"
            
            # Extract vulnerable package names
            vulnerable_packages=$(jq -r '.[].package_name' current-vulns.json | sort -u)
            echo "vulnerable_packages<<EOF" >> $GITHUB_ENV
            echo "$vulnerable_packages" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            
            echo "security_updates_needed=true" >> $GITHUB_ENV
          else
            echo "✅ No security vulnerabilities found"
            echo "security_updates_needed=false" >> $GITHUB_ENV
          fi
          
      - name: 🔒 Apply security updates
        if: env.security_updates_needed == 'true'
        run: |
          echo "🔒 Applying security updates..."
          
          # Update vulnerable packages
          while IFS= read -r package; do
            if [ -n "$package" ]; then
              echo "📦 Updating $package..."
              poetry add "$package@latest" || echo "⚠️ Failed to update $package"
            fi
          done <<< "$vulnerable_packages"
          
          # Generate updated lock file
          poetry lock --no-update
          
      - name: 🧪 Test security updates
        if: env.security_updates_needed == 'true'
        run: |
          echo "🧪 Testing security updates..."
          
          # Install updated dependencies
          poetry install --with dev,test,security
          
          # Run quick test suite
          poetry run pytest tests/unit/ -x -q --tb=short
          
          # Run security scan on updated dependencies
          poetry run safety check
          poetry run bandit -r src/ -ll
          
      - name: 📝 Create security update PR
        if: env.security_updates_needed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "security: update vulnerable dependencies"
          title: "🔒 Security: Automated dependency security updates"
          body: |
            ## 🔒 Security Dependency Updates
            
            This PR contains automated security updates for vulnerable dependencies.
            
            ### 🚨 Vulnerabilities Fixed
            
            The following packages had security vulnerabilities:
            ```
            ${{ env.vulnerable_packages }}
            ```
            
            ### ✅ Validation
            
            - [x] Security scan passed
            - [x] Unit tests passed
            - [x] No breaking changes detected
            
            ### 🤖 Auto-generated
            
            This PR was automatically generated by the dependency update workflow.
            It is eligible for auto-merge if all CI checks pass.
          branch: security/dependency-updates-${{ github.run_number }}
          labels: |
            security
            dependencies
            auto-merge-eligible
          reviewers: security-team

  # ============================================================================
  # Regular Dependency Updates
  # ============================================================================
  dependency-updates:
    name: 📦 Dependency Updates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event.inputs.update_type != 'security-only'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.7.1"
          
      - name: 🔍 Check for outdated packages
        run: |
          echo "🔍 Checking for outdated packages..."
          
          # Get list of outdated packages
          poetry show --outdated > outdated-packages.txt || true
          
          if [ -s outdated-packages.txt ]; then
            outdated_count=$(wc -l < outdated-packages.txt)
            echo "📦 Found $outdated_count outdated packages"
            echo "updates_available=true" >> $GITHUB_ENV
            
            # Show outdated packages
            echo "📋 Outdated packages:"
            cat outdated-packages.txt
          else
            echo "✅ All packages are up to date"
            echo "updates_available=false" >> $GITHUB_ENV
          fi
          
      - name: 📦 Update dependencies
        if: env.updates_available == 'true'
        run: |
          echo "📦 Updating dependencies..."
          
          update_type="${{ github.event.inputs.update_type || 'minor' }}"
          
          case $update_type in
            "patch")
              echo "🔧 Applying patch updates only..."
              poetry update --dry-run | grep -E "patch|bugfix" || true
              ;;
            "minor")
              echo "🔧 Applying minor updates..."
              poetry update
              ;;
            "major")
              echo "🔧 Applying major updates (use with caution)..."
              poetry update
              ;;
          esac
          
      - name: 🧪 Test updated dependencies
        if: env.updates_available == 'true'
        run: |
          echo "🧪 Testing updated dependencies..."
          
          # Install updated dependencies
          poetry install --with dev,test,security
          
          # Run comprehensive test suite
          poetry run pytest tests/unit/ tests/integration/ -v
          
          # Run security checks
          poetry run safety check
          poetry run bandit -r src/ -ll
          
          # Check for breaking changes
          poetry run mypy src/
          
      - name: 📊 Generate update report
        if: env.updates_available == 'true'
        run: |
          echo "📊 Generating dependency update report..."
          
          # Compare before and after
          poetry show --tree > updated-dependencies.txt
          
          # Generate license report
          poetry run pip-licenses --format=json --output-file=updated-licenses.json
          python scripts/validate_licenses.py updated-licenses.json --output-report=license-report.md
          
      - name: 📝 Create dependency update PR
        if: env.updates_available == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "deps: update dependencies (${{ github.event.inputs.update_type || 'minor' }})"
          title: "📦 Dependencies: Automated ${{ github.event.inputs.update_type || 'minor' }} updates"
          body: |
            ## 📦 Dependency Updates
            
            This PR contains automated dependency updates.
            
            ### 📋 Update Details
            
            - **Update Type**: ${{ github.event.inputs.update_type || 'minor' }}
            - **Packages Updated**: See changed files
            - **Security Impact**: All security checks passed
            
            ### ✅ Validation
            
            - [x] All tests passed
            - [x] Security scan passed
            - [x] License compliance verified
            - [x] No breaking changes detected
            
            ### 📊 Impact Analysis
            
            - Dependencies before: $(cat outdated-packages.txt | wc -l) outdated
            - Dependencies after: All up to date
            - License compliance: ✅ All approved licenses
            
            ### 🤖 Auto-generated
            
            This PR was automatically generated by the dependency update workflow.
            Review the changes and merge if everything looks good.
          branch: deps/automated-updates-${{ github.run_number }}
          labels: |
            dependencies
            automated
          reviewers: orchestra-ai-team

  # ============================================================================
  # Pre-commit Hook Updates
  # ============================================================================
  precommit-updates:
    name: 🪝 Pre-commit Updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🔧 Update pre-commit hooks
        run: |
          echo "🪝 Updating pre-commit hooks..."
          
          # Install pre-commit
          pip install pre-commit
          
          # Update hook versions
          pre-commit autoupdate
          
          # Test updated hooks
          pre-commit run --all-files || echo "⚠️ Some hooks need fixes"
          
      - name: 📝 Create pre-commit update PR
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update pre-commit hooks"
          title: "🪝 Chore: Update pre-commit hook versions"
          body: |
            ## 🪝 Pre-commit Hook Updates
            
            This PR updates pre-commit hook versions to their latest releases.
            
            ### ✅ Validation
            
            - [x] Hook versions updated
            - [x] Configuration validated
            - [x] Hooks tested on codebase
            
            ### 🤖 Auto-generated
            
            This PR was automatically generated by the dependency update workflow.
          branch: chore/precommit-updates-${{ github.run_number }}
          labels: |
            chore
            pre-commit
            automated

  # ============================================================================
  # Update Summary
  # ============================================================================
  update-summary:
    name: 📊 Update Summary
    runs-on: ubuntu-latest
    needs: [security-updates, dependency-updates, precommit-updates]
    if: always()
    
    steps:
      - name: 📊 Generate update summary
        run: |
          echo "📊 DEPENDENCY UPDATE SUMMARY"
          echo "============================"
          echo "Generated: $(date)"
          echo ""
          
          echo "🔒 Security Updates: ${{ needs.security-updates.result }}"
          echo "📦 Dependency Updates: ${{ needs.dependency-updates.result }}"
          echo "🪝 Pre-commit Updates: ${{ needs.precommit-updates.result }}"
          echo ""
          
          # Check for any failures
          failed_jobs=""
          if [ "${{ needs.security-updates.result }}" = "failure" ]; then
            failed_jobs="$failed_jobs security-updates"
          fi
          if [ "${{ needs.dependency-updates.result }}" = "failure" ]; then
            failed_jobs="$failed_jobs dependency-updates"
          fi
          if [ "${{ needs.precommit-updates.result }}" = "failure" ]; then
            failed_jobs="$failed_jobs precommit-updates"
          fi
          
          if [ -n "$failed_jobs" ]; then
            echo "🚨 ALERT: Failed update jobs: $failed_jobs"
          else
            echo "✅ All update jobs completed successfully"
          fi