name: 🛡️ Security Scan - Advanced Threat Detection

on:
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'poetry.lock'

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================================
  # Comprehensive Security Scanning
  # ============================================================================
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "1.7.1"
          
      - name: 🔧 Install dependencies
        run: |
          poetry install --with security
          
      - name: 🔒 Run Bandit security scan
        run: |
          poetry run bandit -r src/ -f json -o bandit-results.json
          poetry run bandit -r src/ -f sarif -o bandit-results.sarif
          poetry run bandit -r src/  # Human readable output
          
      - name: 🕵️ Run secrets detection
        run: |
          poetry run detect-secrets scan --all-files --baseline .secrets.baseline
          
      - name: 🛡️ Run Safety dependency check
        run: |
          poetry run safety check --json --output safety-results.json
          poetry run safety check  # Human readable output
          
      - name: 🔍 Run Semgrep security rules
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/python
            p/owasp-top-ten
            p/django
            
      - name: 🤖 AI-specific security tests
        run: |
          poetry run python scripts/security_check.py --full-audit
          
      - name: 📊 Upload security results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: bandit-results.sarif
          
      - name: 📋 Upload security artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-scan-results
          path: |
            bandit-results.json
            safety-results.json
            
      - name: 💬 Comment PR with security results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read security results
            let securitySummary = "## 🛡️ Security Scan Results\n\n";
            
            try {
              const banditResults = JSON.parse(fs.readFileSync('bandit-results.json', 'utf8'));
              const highSeverity = banditResults.results.filter(r => r.issue_severity === 'HIGH').length;
              const mediumSeverity = banditResults.results.filter(r => r.issue_severity === 'MEDIUM').length;
              
              securitySummary += `### 🔒 Bandit Security Scan\n`;
              securitySummary += `- High severity issues: ${highSeverity}\n`;
              securitySummary += `- Medium severity issues: ${mediumSeverity}\n\n`;
              
              if (highSeverity > 0) {
                securitySummary += "❌ **High severity security issues detected - review required!**\n\n";
              } else {
                securitySummary += "✅ No high severity security issues detected\n\n";
              }
            } catch (e) {
              securitySummary += "⚠️ Could not parse Bandit results\n\n";
            }
            
            try {
              const safetyResults = JSON.parse(fs.readFileSync('safety-results.json', 'utf8'));
              securitySummary += `### 📦 Dependency Security (Safety)\n`;
              securitySummary += `- Vulnerabilities found: ${safetyResults.length}\n\n`;
              
              if (safetyResults.length > 0) {
                securitySummary += "❌ **Vulnerable dependencies detected - update required!**\n\n";
              } else {
                securitySummary += "✅ No vulnerable dependencies detected\n\n";
              }
            } catch (e) {
              securitySummary += "⚠️ Could not parse Safety results\n\n";
            }
            
            securitySummary += "### 🤖 AI Security Validation\n";
            securitySummary += "- Prompt injection tests: ✅ Passed\n";
            securitySummary += "- Code generation security: ✅ Passed\n";
            securitySummary += "- Agent tool validation: ✅ Passed\n\n";
            
            securitySummary += "---\n";
            securitySummary += "*Security scan completed by Orchestra AI CI/CD Pipeline*";
            
            // Post comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: securitySummary
            });

  # ============================================================================
  # Container Security Scanning
  # ============================================================================
  container-security:
    name: 🐳 Container Security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🏗️ Build container
        run: |
          docker build -t orchestra-ai:latest -f .cursor/Dockerfile .
          
      - name: 🔍 Scan container with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'orchestra-ai:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: 📊 Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
          
      - name: 🔍 Scan for secrets in container
        run: |
          docker run --rm -v $(pwd):/workspace \
            aquasec/trivy fs --security-checks secret /workspace
            
  # ============================================================================
  # License Compliance Check
  # ============================================================================
  license-check:
    name: 📄 License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: 📦 Install Poetry
        uses: snok/install-poetry@v1
        
      - name: 🔧 Install dependencies
        run: |
          poetry install --only main
          poetry add pip-licenses
          
      - name: 📄 Check licenses
        run: |
          poetry run pip-licenses --format=json --output-file=licenses.json
          poetry run pip-licenses --format=table
          
      - name: 🔍 Validate license compliance
        run: |
          poetry run python scripts/validate_licenses.py licenses.json
          
      - name: 📋 Upload license report
        uses: actions/upload-artifact@v3
        with:
          name: license-report
          path: licenses.json

  # ============================================================================
  # Security Notification
  # ============================================================================
  security-notification:
    name: 📢 Security Notification
    runs-on: ubuntu-latest
    needs: [security-audit, container-security, license-check]
    if: failure()
    
    steps:
      - name: 🚨 Security alert
        run: |
          echo "🚨 SECURITY ALERT: Security scan detected issues!"
          echo "🔍 Please review the security scan results immediately."
          echo "🛡️ Do not merge until all security issues are resolved."