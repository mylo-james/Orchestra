[tool.poetry]
name = "orchestra"
version = "0.1.0"
description = "AI Agent System for Development Team Orchestration"
authors = ["Orchestra Development Team"]
readme = "README.md"
packages = [{include = "src"}]

[tool.poetry.dependencies]
python = "^3.12.0"
# CLI Framework
typer = "^0.9.0"
rich = "^13.7.0"
# Agent Framework
openai = "^1.0.0"
# Input Validation and Data Models
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"
# HTTP Client
httpx = "^0.26.0"
# Configuration and Logging
structlog = "^23.2.0"
# Security Framework
cryptography = "^43.0.0"
# Database
aiosqlite = "^0.19.0"

[tool.poetry.group.dev.dependencies]
# Testing
pytest = "^7.4.0"
pytest-asyncio = "^0.23.0"
pytest-cov = "^4.1.0"
# Code Quality and Security
ruff = "^0.1.9"
black = "^23.12.0"
isort = "^5.13.0"
bandit = "^1.7.5"
# Pre-commit hooks
pre-commit = "^3.6.0"
# Type checking
mypy = "^1.8.0"

[tool.poetry.scripts]
orchestra = "src.cli.main:app"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

# Black configuration
[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'

# isort configuration
[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["src", "tests"]

# Ruff configuration
[tool.ruff]
target-version = "py312"
line-length = 88
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "UP", # pyupgrade
    "S",  # bandit security
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
]

[tool.ruff.per-file-ignores]
"tests/*" = ["S101", "S106"]  # Allow assert statements and hardcoded passwords in tests
"scripts/*" = ["S602", "S603", "S607"]  # Allow subprocess calls in setup scripts

# Pytest configuration
[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --cov=src --cov-report=term-missing"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "security: marks tests as security tests",
]
asyncio_mode = "auto"

# MyPy configuration
[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
no_implicit_optional = true
show_error_codes = true

# Coverage configuration
[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__init__.py",
]